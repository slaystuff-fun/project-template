name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: pfrncs
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            REPO_DIR="/opt/slaystuff/projects/${{ github.event.repository.name }}"
            if [ -d "$REPO_DIR/.git" ]; then
              git -C "$REPO_DIR" pull
            else
              rm -rf "$REPO_DIR"
              git clone git@github.com:slaystuff-fun/${{ github.event.repository.name }}.git "$REPO_DIR"
            fi
            docker compose -f "$REPO_DIR/docker-compose.yml" up --build -d
